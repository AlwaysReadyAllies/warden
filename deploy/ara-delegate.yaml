# Warden policy for fronting the ara-delegate MCP server (the gang dispatcher).
# Warden guards the thing that commands four frontier CLIs.
mode: allow                       # audit everything; gate the dangerous tool
servers:
  ara_delegate:                   # safe identifier (no '-' / no '__'); namespaces as ara_delegate__<tool>
    cmd: ["python3", "/home/croft/user/Ara/tools/orchestrator/mcp_server.py"]
    tools:
      delegate_registry: { action: allow }   # read-only: list capabilities
      delegate_plan:     { action: allow }    # planning
      delegate:          { action: gate, reason: "dispatches a frontier CLI; may edit files" }
sensitive_actions: [delegate]
rules:
  # belt-and-suspenders: any edit-capable dispatch is gated even if policy widened
  - id: delegate-edit-mode
    match: { arg_regex: "allow_edits|--allow-edits|\"role\"\\s*:\\s*\"implement\"" }
    action: gate
