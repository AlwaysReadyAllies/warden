# Reference policy for `warden prove --live`: fronts the deliberately-vulnerable reference target
# (warden/targets/reference_target.py) so the live proof demonstrates Warden blocking real attacks
# end-to-end over stdio.
#
mode: allow

# capability_deny_overrides makes a capability-scoped DENY authoritative — it wins even over the
# per-tool `action: allow` below, so `delete_record` can be advertised yet still hard-denied by the
# DELETE capability rule. (With this off, an explicit tool allow would override the capability deny.)
capability_deny_overrides: true

servers:
  reference:
    cmd: ["python3", "-m", "warden.targets.reference_target"]
    tools:
      # guard catches the injection/egress payloads; boundaries catch SSRF/traversal destinations
      fetch_url:    { action: allow }
      read_file:    { action: allow }
      run_command:  { action: allow }
      run_query:    { action: allow }
      send_message: { action: allow }
      # allowed, but the amount is capped and the outcome must be verified
      transfer_funds:
        action: allow
        arguments:
          amount: { type: number, maximum: 100 }
        postconditions:
          - path: "$.status"
            equals: "completed"
      # advertised so agents can discover it, but the DELETE capability rule below denies it outright
      delete_record: { action: allow }

# resource boundaries: the only network destination and filesystem root the tools may touch
constraints:
  network:
    domains: ["api.internal.example"]
  filesystem:
    roots: ["/workspace"]

# capability policy: deletion is denied outright (authoritative, per capability_deny_overrides)
rules:
  - id: deny_delete
    match: { capability: DELETE }
    action: deny
